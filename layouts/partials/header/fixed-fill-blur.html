<div class="min-h-[60px]"></div>
<div class="fixed inset-x-0 z-100">
  <div
    id="menu-blur"
    class="absolute opacity-0 inset-x-0 top-0 h-full single_hero_background nozoom dark:backdrop-saturate-180 dark:backdrop-brightness-95 bg-primary-500 bg-linear-60 dark:bg-primary-800/30 shadow-xl"></div>
  <div class="relative m-auto leading-7 max-tarnach-content-width px-6 sm:px-14 md:px-24 lg:px-32">
    {{ partial "header/basic.html" . }}
  </div>
</div>
{{ $backgroundBlur := resources.Get "js/background-blur.js" }}
{{ $backgroundBlur = $backgroundBlur | resources.Minify | resources.Fingerprint (.Site.Params.fingerprintAlgorithm | default "sha512") }}
<script
  type="text/javascript"
  src="{{ $backgroundBlur.RelPermalink }}"
  integrity="{{ $backgroundBlur.Data.Integrity }}"
  data-blur-id="menu-blur"></script>
